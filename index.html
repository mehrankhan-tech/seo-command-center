<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThoughtSpot SEO Command Center</title>
<style>
  :root {
    --ink: #0B1220;
    --ink-2: #131C2E;
    --ink-3: #1C2840;
    --line: #243150;
    --line-soft: #1A2438;
    --paper: #F7F8FA;
    --paper-2: #FFFFFF;
    --paper-line: #E6E9EF;
    --text: #0E1525;
    --text-soft: #5A6478;
    --text-faint: #8A92A3;
    --signal: #2F7DF6;
    --signal-soft: #E8F0FE;
    --signal-deep: #1B4FA8;
    --amber: #F2A33C;
    --amber-soft: #FCF1DF;
    --amber-deep: #8A5A12;
    --teal: #19A98A;
    --teal-soft: #E2F5EF;
    --radius: 12px;
    --radius-sm: 8px;
    --mono: 'SFMono-Regular', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--text);
    line-height: 1.5;
  }
  /* ===== Layout ===== */
  .shell { display: grid; grid-template-columns: 268px 1fr; min-height: 100vh; }

  /* ===== Sidebar ===== */
  .nav {
    background: var(--ink);
    color: #C9D2E3;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow: hidden;
  }
  .nav-head { padding: 22px 20px 16px; border-bottom: 1px solid var(--line-soft); }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--signal);
    display: grid; place-items: center;
    position: relative; flex-shrink: 0;
  }
  .brand-mark::before {
    content: ""; width: 11px; height: 11px;
    border: 2.5px solid #fff; border-radius: 50%;
  }
  .brand-mark::after {
    content: ""; position: absolute; width: 8px; height: 2.5px;
    background: #fff; border-radius: 2px;
    right: 5px; bottom: 6px; transform: rotate(45deg);
    transform-origin: right;
  }
  .brand-text b { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: -0.2px; display: block; }
  .brand-text span { color: var(--text-faint); font-size: 11px; letter-spacing: 0.3px; }
  .nav-meta { padding: 12px 20px; display: flex; gap: 18px; border-bottom: 1px solid var(--line-soft); }
  .nav-meta div span { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); }
  .nav-meta div b { font-size: 14px; color: #fff; font-weight: 600; }
  .nav-list { flex: 1; overflow-y: auto; padding: 10px 10px 20px; }
  .nav-list::-webkit-scrollbar { width: 8px; }
  .nav-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-faint); padding: 10px 10px 6px; }
  .agent-link {
    width: 100%; display: flex; align-items: center; gap: 11px;
    padding: 9px 10px; border-radius: var(--radius-sm);
    border: none; background: transparent; cursor: pointer;
    text-align: left; color: #C9D2E3; transition: background .12s;
  }
  .agent-link:hover { background: var(--ink-2); }
  .agent-link.on { background: var(--ink-3); }
  .agent-link.on .al-num { color: #fff; }
  .al-num {
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
    width: 18px; flex-shrink: 0;
  }
  .al-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .al-name { font-size: 13px; font-weight: 500; color: #E6EBF4; }
  .nav-foot { padding: 14px 20px; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--text-faint); }

  /* ===== Main ===== */
  .main { padding: 0; overflow-x: hidden; }
  .topbar {
    background: var(--paper-2); border-bottom: 1px solid var(--paper-line);
    padding: 20px 36px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 5;
  }
  .topbar-icon {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center; font-size: 20px;
  }
  .topbar h1 { font-size: 19px; font-weight: 650; letter-spacing: -0.3px; }
  .topbar p { font-size: 13px; color: var(--text-soft); margin-top: 1px; }
  .topbar-spacer { flex: 1; }
  .tag {
    font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .content { padding: 32px 36px 60px; max-width: 980px; }

  .panel-intro { font-size: 14px; color: var(--text-soft); margin-bottom: 28px; max-width: 680px; line-height: 1.65; }
  .panel-intro b { color: var(--text); font-weight: 600; }

  .sec-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-faint); font-weight: 600;
    margin: 0 0 14px; display: flex; align-items: center; gap: 10px;
  }
  .sec-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-line); }

  /* prompt cards */
  .prompts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 34px; }
  .prompt {
    background: var(--paper-2); border: 1px solid var(--paper-line);
    border-radius: var(--radius); padding: 15px 16px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: border-color .12s, box-shadow .12s;
  }
  .prompt:hover { border-color: #CFD6E2; box-shadow: 0 2px 10px rgba(15,25,45,.05); }
  .prompt-text { flex: 1; font-size: 13.5px; color: var(--text); line-height: 1.55; }
  .copy-btn {
    flex-shrink: 0; font-family: var(--sans); font-size: 12px; font-weight: 600;
    padding: 7px 13px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--paper-line); background: var(--paper);
    color: var(--text-soft); display: flex; align-items: center; gap: 6px;
    transition: all .12s; white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--signal); color: var(--signal); background: var(--signal-soft); }
  .copy-btn.open { border-color: #CDD9EC; color: var(--signal-deep); }
  .copy-btn.open:hover { background: var(--signal); color: #fff; border-color: var(--signal); }
  .copy-btn.done { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
  .copy-ico { width: 13px; height: 13px; }

  /* preview of sharpened prompt */
  .preview {
    margin-top: 16px; background: var(--ink-2); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 14px 15px;
  }
  .preview-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--amber); font-weight: 700; margin-bottom: 8px; }
  .preview-body { font-size: 12.5px; line-height: 1.6; color: #DCE3F0; white-space: pre-wrap; font-family: var(--mono); background: var(--ink); border-radius: 6px; padding: 11px 12px; border: 1px solid var(--line-soft); }
  .preview-foot { display: flex; align-items: center; gap: 12px; margin-top: 11px; flex-wrap: wrap; }
  .preview-foot span { font-size: 12px; color: var(--teal); flex: 1; min-width: 160px; }
  .btn-primary.sm { padding: 7px 13px; font-size: 12px; }
  .fallback-note { color: var(--text-faint); font-size: 11.5px; margin-top: 12px; line-height: 1.5; }

  /* builder */
  .builder {
    background: var(--ink); border-radius: var(--radius); padding: 20px;
    margin-bottom: 12px;
  }
  .builder h3 { color: #fff; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .builder p { color: var(--text-faint); font-size: 12.5px; margin-bottom: 14px; }
  .builder textarea {
    width: 100%; min-height: 80px; resize: vertical;
    background: var(--ink-2); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 12px 13px;
    color: #E6EBF4; font-family: var(--sans); font-size: 13.5px; line-height: 1.55;
    outline: none;
  }
  .builder textarea::placeholder { color: #5A6478; }
  .builder textarea:focus { border-color: var(--signal); }
  .builder-actions { display: flex; gap: 10px; margin-top: 12px; }
  .btn-primary {
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: var(--radius-sm); cursor: pointer;
    border: none; background: var(--signal); color: #fff;
    display: flex; align-items: center; gap: 7px; transition: background .12s;
  }
  .btn-primary:hover { background: #2468d6; }
  .btn-primary.done { background: var(--teal); }
  .btn-ghost {
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    padding: 9px 16px; border-radius: var(--radius-sm); cursor: pointer;
    border: 1px solid var(--line); background: transparent; color: #C9D2E3;
    transition: all .12s; text-decoration: none; display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-ghost:hover { background: var(--ink-2); border-color: var(--signal); }

  /* data table (keyword agent) */
  .data-wrap { background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: var(--radius); overflow: hidden; margin-bottom: 34px; }
  .data-head { padding: 13px 16px; border-bottom: 1px solid var(--paper-line); display: flex; align-items: center; gap: 9px; }
  .data-head b { font-size: 13px; font-weight: 600; }
  .data-head span { font-size: 11px; color: var(--text-faint); background: var(--paper); padding: 3px 9px; border-radius: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 16px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); font-weight: 600; border-bottom: 1px solid var(--paper-line); background: #FBFCFD; }
  td { padding: 11px 16px; border-bottom: 1px solid #F0F2F6; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FBFCFD; }
  .kw { font-weight: 500; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; display: inline-block; }
  .diff { font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .star { color: var(--amber); font-size: 13px; }

  .empty-note { color: var(--text-faint); font-size: 13px; font-style: italic; padding: 4px 0 30px; }

  .hide { display: none; }

  @media (max-width: 820px) {
    .shell { grid-template-columns: 1fr; }
    .nav { position: relative; height: auto; }
    .nav-list { max-height: 240px; }
    .content { padding: 24px 20px 50px; }
    .topbar { padding: 16px 20px; }
  }
</style>
</head>

<div class="shell">

function buildPrompt(a, task) {
  return `You are ${a.role} for ${ABOUT}.\n\nTask: ${task}\n\n${a.extra}`;
}

// Rewrites a rough idea into a sharper task before wrapping it.
function sharpenTask(raw) {
  let t = raw.trim().replace(/\s+/g, ' ');
  if (!t) return { task: '', tips: [] };
  // strip leading filler
  t = t.replace(/^(can you|could you|please|i want to|i need to|help me|pls)\s+/i, '');
  // capitalize first letter
  t = t.charAt(0).toUpperCase() + t.slice(1);
  // drop trailing punctuation noise
  t = t.replace(/[.?!]+$/, '');

  const tips = [];
  const words = t.split(' ').length;
  if (words < 6) tips.push('expanded a short request with a clear deliverable');
  if (!/thoughtspot/i.test(t)) tips.push('anchored it to thoughtspot.com');
  if (!/(list|table|steps|examples|brief|outline|variants|compare|priorit)/i.test(t))
    tips.push('asked for a specific, structured output');

  // build an enriched task line
  let enriched = t;
  if (!/thoughtspot/i.test(enriched)) enriched += ' for ThoughtSpot';
  enriched += '. Be specific to ThoughtSpot\'s market, give concrete examples, and present the answer in a clear, structured format (use a table or numbered steps where it helps).';

  return { task: enriched, tips };
}

let lastPreviewPrompt = '';

function suggest() {
  const a = agents[current];
  const raw = document.getElementById('taskInput').value;
  if (!raw.trim()) { document.getElementById('taskInput').focus(); return; }
  const { task, tips } = sharpenTask(raw);
  const full = buildPrompt(a, task);
  lastPreviewPrompt = full;
  document.getElementById('previewBody').textContent = full;
  document.getElementById('previewNote').textContent =
    tips.length ? 'Improved: ' + tips.join(', ') + '.' : 'Looked solid — wrapped it in the agent\u2019s expertise.';
  document.getElementById('preview').classList.remove('hide');
}

function resetPreview() {
  document.getElementById('preview').classList.add('hide');
  lastPreviewPrompt = '';
}

function launchClaude(text) {
  doCopy(text);
  const url = 'https://claude.ai/new?q=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener');
}

function openInClaude(i) {
  const a = agents[current];
  launchClaude(buildPrompt(a, a.prompts[i]));
  flashBtn(document.getElementById('cb-'+i), 'Opening\u2026');
}

function openCustom() {
  const a = agents[current];
  const raw = document.getElementById('taskInput').value;
  if (!raw.trim()) { document.getElementById('taskInput').focus(); return; }
  const { task } = sharpenTask(raw);
  launchClaude(buildPrompt(a, task));
  flashBtn(document.getElementById('buildBtn'), 'Opening\u2026');
}

function openPreview() {
  if (lastPreviewPrompt) launchClaude(lastPreviewPrompt);
}

function diffColor(d) {
  if (d <= 22) return ["#E2F5EF","#0E6B57"];
  if (d <= 32) return ["#FCF1DF","#8A5A12"];
  return ["#FBEAF0","#993556"];
}
function intentColor(i) {
  return i === "Commercial" ? ["#E8F0FE","#1B4FA8"]
       : i === "Transactional" ? ["#FBEAF0","#993556"]
       : ["#F1EFE8","#5F5E5A"];
}

let current = 0;

function renderNav() {
  const list = document.getElementById('navList');
  list.innerHTML = '<div class="nav-label">The Squad</div>' + agents.map((a,i)=>`
    <button class="agent-link ${i===current?'on':''}" onclick="select(${i})">
      <span class="al-num">${String(a.n).padStart(2,'0')}</span>
      <span class="al-dot" style="background:${a.color}"></span>
      <span class="al-name">${a.name}</span>
    </button>`).join('');
}

function renderMain() {
  const a = agents[current];
  document.getElementById('tIcon').style.background = a.soft;
  document.getElementById('tIcon').style.color = a.deep;
  document.getElementById('tIcon').innerHTML = a.icon;
  document.getElementById('tName').textContent = a.name;
  document.getElementById('tDesc').textContent = a.desc;
  const tag = document.getElementById('tTag');
  tag.textContent = 'Agent ' + String(a.n).padStart(2,'0');
  tag.style.background = a.soft; tag.style.color = a.deep;

  let dataBlock = '';
  if (a.hasData) {
    dataBlock = `
    <div class="sec-label">Pre-loaded result · cloud analytics keywords</div>
    <div class="data-wrap">
      <div class="data-head"><b>20 low-difficulty opportunities</b><span>★ = top priority</span></div>
      <table>
        <thead><tr><th>Keyword</th><th>Intent</th><th>Difficulty</th><th>Volume</th><th>Content type</th></tr></thead>
        <tbody>
        ${kwData.map(r=>{
          const [dc,dt]=diffColor(r[2]); const [ic,it]=intentColor(r[1]);
          return `<tr>
            <td class="kw">${r[5]?'<span class="star">★</span> ':''}${r[0]}</td>
            <td><span class="pill" style="background:${ic};color:${it}">${r[1]}</span></td>
            <td class="diff" style="color:${dt}">${r[2]}</td>
            <td>${r[3]}</td>
            <td style="color:var(--text-soft)">${r[4]}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  document.getElementById('content').innerHTML = `
    <p class="panel-intro"><b>${a.role.charAt(0).toUpperCase()+a.role.slice(1)}</b>, tuned for ${SITE}. ${a.extra}</p>

    <div class="sec-label">Ready-to-run prompts · one click opens Claude</div>
    <div class="prompts">
      ${a.prompts.map((p,i)=>`
        <div class="prompt">
          <div class="prompt-text">${p}</div>
          <button class="copy-btn open" id="cb-${i}" onclick="openInClaude(${i})">
            <svg class="copy-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg>
            Open in Claude
          </button>
        </div>`).join('')}
    </div>

    <div class="sec-label">Write your own · we'll sharpen it first</div>
    <div class="builder">
      <h3>Rough idea for the ${a.name} agent</h3>
      <p>Type it however it comes out. We'll rewrite it into a sharp, structured prompt, then open Claude with it loaded.</p>
      <textarea id="taskInput" placeholder="e.g. ${a.prompts[0].toLowerCase()}" oninput="resetPreview()"></textarea>
      <div class="builder-actions">
        <button class="btn-ghost" id="suggestBtn" onclick="suggest()">
          <svg class="copy-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
          Suggest improvements
        </button>
        <button class="btn-primary" id="buildBtn" onclick="openCustom()">
          <svg class="copy-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg>
          Open in Claude
        </button>
      </div>
      <div class="preview hide" id="preview">
        <div class="preview-tag">Sharpened prompt</div>
        <div class="preview-body" id="previewBody"></div>
        <div class="preview-foot">
          <span id="previewNote"></span>
          <button class="btn-primary sm" onclick="openPreview()">
            <svg class="copy-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg>
            Open this in Claude
          </button>
        </div>
      </div>
      <p class="fallback-note">Opens a new Claude tab with the prompt loaded. The prompt is also copied to your clipboard — if it doesn't auto-fill, just paste.</p>
    </div>

    ${dataBlock}
  `;
}

function flashBtn(btn, label) {
  const orig = btn.innerHTML;
  btn.classList.add('done');
  btn.innerHTML = '<svg class="copy-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> ' + label;
  setTimeout(()=>{ btn.classList.remove('done'); btn.innerHTML = orig; }, 1600);
}

function doCopy(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  return Promise.resolve();
}

function select(i) { current = i; renderNav(); renderMain(); window.scrollTo(0,0); }

renderNav();
renderMain();
</script>
</body>
</html>
